<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <path id="saqr-top" d="M38,63 A100 100 0 0 1 202,63"/>
    <path id="saqr-bot" d="M197,184 A100 100 0 0 1 43,184"/>
  </defs>

  <!-- rings -->
  <circle cx="120" cy="120" r="118" fill="#8A1538"/>
  <circle cx="120" cy="120" r="111" fill="none" stroke="#C9A24B" stroke-width="2"/>
  <circle cx="120" cy="120" r="88" fill="#FAF6EF"/>
  <circle cx="120" cy="120" r="88" fill="none" stroke="#C9A24B" stroke-width="1.5"/>

  <!-- arched text -->
  <g fill="#E0C074" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text font-size="11.5" letter-spacing="1.6">
      <textPath href="#saqr-top" startOffset="50%" text-anchor="middle">SAQR · PREMIUM MEATS</textPath>
    </text>
    <text font-size="9.5" letter-spacing="1.4">
      <textPath href="#saqr-bot" startOffset="50%" text-anchor="middle">DOHA · QATAR · HALAL</textPath>
    </text>
  </g>

  <!-- side stars -->
  <g fill="#C9A24B">
    <path d="M20,120 l4,-4 4,4 -4,4 z"/>
    <path d="M212,120 l4,-4 4,4 -4,4 z"/>
  </g>

  <!-- falcon, centered in sand field -->
  <g transform="translate(65,80) scale(1.1)">
    <path fill="#8A1538" d="M64,10 C46,8 33,16 30,28 L11,31 C6,32 5,37 10,38 L22,35 C26,48 40,60 58,62 C74,64 90,54 94,38 C98,20 84,12 64,10 Z"/>
    <path fill="#C9A24B" d="M38,23 C44,21 50,23 51,28 C52,33 46,35 41,34 C36,33 33,25 38,23 Z"/>
    <circle cx="43" cy="28" r="2.6" fill="#241B16"/>
    <path fill="#C9A24B" d="M40,34 C42,42 40,50 35,55 C33,47 35,39 38,34 Z"/>
  </g>

  <!-- Arabic wordmark under falcon -->
  <text x="120" y="168" fill="#8A1538" font-family="'Geeza Pro','Noto Naskh Arabic',serif" font-size="20" font-weight="700" text-anchor="middle">صقر</text>
</svg>
