  <circle cx="100" cy="100" r="96" fill="none" stroke="#C9A24B" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="#8A1538"/>
  <circle cx="100" cy="100" r="66" fill="none" stroke="#C9A24B" stroke-width="1.5"/>

